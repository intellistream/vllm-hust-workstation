name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        env:
          HOME: ${{ github.workspace }}/.ci-home
          XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
          XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
        run: npm ci

      - name: Validate shell helper syntax
        run: bash -n quickstart.sh

      - name: Validate Python helper syntax
        run: python3 -m py_compile server.py

      - name: Build Next.js app
        env:
          HOME: ${{ github.workspace }}/.ci-home
          XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
          XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
        run: npm run build